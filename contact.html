<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takanashi Works</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <!-- =================
Header
================= -->
    <!-- =================
Header
================= -->
    <header class="header">
        <div class="header__inner">
            <h1 class="header__logo">
                <a href="/">
                    <img src="img/logo_image.png" alt="Takanashi Works logo">
                    <span class="header__logo-text">
                        Takanashi Works
                    </span>
                </a>
            </h1>
            <!-- ハンバーガー -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <!-- ナビゲーション -->
            <div class="navigation-container">
                <nav class="nav" id="nav">
                    <ul class="nav__list">
                        <li><a href="/about.html">ごあいさつ</a></li>
                        <li><a href="#skils">できること</a></li>
                        <li><a href="/works.html">制作実績</a></li>
                    </ul>
                    <!-- CTAボタン-->
                    <a href="/contact.html" class="header__contact">
                        Contact
                    </a>

                </nav>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>
    </header>
    <!-- Contact -->
    <section class="contact">
        <div class="contact__inner">
            <h2 class="contact__title">お問い合わせ</h2>
            <form class="contact__form" action="#" method="post">
                <!-- 名前 -->
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <!-- フリガナ -->
                <div class="form-group">
                    <label for="kana">フリガナ</label>
                    <input type="text" id="kana" name="kana" required>
                </div>
                <!-- メール -->
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <!-- 電話 -->
                <div class="form-group">
                    <label for="tel">電話番号</label>
                    <input type="tel" id="tel" name="tel" required>
                </div>
                <!-- お問い合わせ内容-->
                <div class="form-group">
                    <label for="message">お問い合わせ内容</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>
                <!-- プライバシーポリシー -->
                <div class="form-check">
                    <label>
                        <input type="checkbox" name="privacy" required>
                        プライバシーポリシーに同意する
                    </label>
                </div>
                <!-- 送信するボタン -->
                <div class="form-submit">
                    <button type="submit">送信する</button>
                    <a href="/index.html" class="back-button">トップへ戻る</a>
                </div>

            </form>
        </div>

    </section>
    </main>
    <footer id="footer" class="footer outer-block">
        <div class="logo">

            <a href="#">
                <img src="img/logo_image.png" alt="鳥">
                <span class="header__logo-text">
                    Takanashi Works
                </span>
            </a>
        </div>
        <ul class="nav">
            <li><a href="#">About</a></li>
            <li><a href="#">Works</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
        <p class="copyright">
            COPYRIGHT © Takanashi Works. All rights Reserved.
        </p>
    </footer>
    <script src="js/main.js"></script>
</body>
